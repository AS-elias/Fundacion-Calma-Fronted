<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/logo-calma.png" alt="Logo Fundación Calma" class="logo">
      <h2>Recuperar Contraseña</h2>
      <p *ngIf="!enviado">Ingresa tu correo institucional y te enviaremos un enlace para restablecer tu contraseña.</p>
    </div>

    <div *ngIf="enviado" class="success-message">
      <i class="pi pi-check-circle" style="font-size: 3rem; color: #2ecc71; margin-bottom: 1rem;"></i>
      <h3>¡Enlace enviado!</h3>
      <p>Si el correo existe en nuestro sistema, en breve recibirás las instrucciones. Revisa también tu carpeta de Spam.</p>
      
      <button class="btn-secondary w-full mt-4" (click)="volverAlLogin()">Volver al Login</button>
    </div>

    <form *ngIf="!enviado" (ngSubmit)="onSubmit()" class="login-form">
      <div class="p-fluid">
        <div class="p-field mb-4">
          <label for="email">Correo Institucional</label>
          <input 
            id="email" 
            type="email" 
            pInputText 
            [(ngModel)]="email" 
            name="email" 
            placeholder="ejemplo@calma.org"
            required>
        </div>

        <button type="submit" class="btn-primary w-full" [disabled]="cargando">
          <span *ngIf="!cargando">Enviar Enlace</span>
          <span *ngIf="cargando"><i class="pi pi-spin pi-spinner"></i> Enviando...</span>
        </button>

        <div class="back-link">
          <a routerLink="/login">Volver al Login</a>
        </div>
      </div>
    </form>
  </div>
</div>
