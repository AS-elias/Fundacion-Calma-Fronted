<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/logo-calma.png" alt="Logo Fundación Calma" class="logo">
      <h2>¡Bienvenido a Calma!</h2>
      <p>Por seguridad, debes crear una contraseña nueva para tu cuenta.</p>
    </div>

    <form (ngSubmit)="onChangePassword()" class="login-form">
      <div class="p-fluid">
        <div class="p-field mb-4">
          <label for="newPassword">Nueva Contraseña</label>
          <p-password 
            id="newPassword" 
            [(ngModel)]="newPassword" 
            name="newPassword" 
            [toggleMask]="true"
            promptLabel="Elige una contraseña segura"
            weakLabel="Débil"
            mediumLabel="Media"
            strongLabel="Fuerte"
            [feedback]="true">
          </p-password>
        </div>

        <div class="p-field mb-4">
          <label for="confirmPassword">Confirmar Nueva Contraseña</label>
          <p-password 
            id="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            name="confirmPassword" 
            [toggleMask]="true"
            [feedback]="false">
          </p-password>
        </div>

        <button type="submit" class="btn-primary w-full" [disabled]="cargando">
          <span *ngIf="!cargando">Guardar y Entrar</span>
          <span *ngIf="cargando"><i class="pi pi-spin pi-spinner"></i> Procesando...</span>
        </button>
      </div>
    </form>
  </div>
</div>
