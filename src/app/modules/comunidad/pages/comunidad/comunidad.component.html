<div class="comunidad-container">
    <!-- Cabecera de Comunidad -->
    <div class="comunidad-header">
        <div class="title">
            <h2>Comunidad</h2>
            <p>Conecta, colabora y comunícate con todos los miembros de la organización.</p>
        </div>
        
        <!-- Buscador y Filtros -->
        <div class="filters">
            <div class="search-box">
                <i class="pi pi-search"></i>
                <input type="text" [(ngModel)]="textoBusqueda" (ngModelChange)="onBusquedaChange()" placeholder="Buscar por nombre, correo o rol..." />
            </div>
            <div class="filter-box">
                <i class="pi pi-filter"></i>
                <select [(ngModel)]="areaSeleccionada" (ngModelChange)="onAreaChange()">
                    <option value="Todos">Todas las áreas</option>
                    <option *ngFor="let area of areas" [value]="area">{{ area }}</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Estado de carga -->
    <div class="loading-state" *ngIf="cargando">
        <i class="pi pi-spin pi-spinner"></i>
        <p>Cargando comunidad...</p>
    </div>

    <!-- Grilla de Contactos -->
    <div class="contacts-grid" *ngIf="!cargando && contactosFiltrados.length > 0">
        <div class="contact-card" *ngFor="let contacto of contactosFiltrados">
            
            <button class="fav-btn" (click)="toggleFavorito(contacto)" [title]="contacto.esFavorito ? 'Quitar de favoritos' : 'Añadir a favoritos'">
                <i class="pi" [ngClass]="contacto.esFavorito ? 'pi-star-fill star-active' : 'pi-star'"></i>
            </button>

            <div class="card-body">
                <div class="avatar-wrapper">
                    <div class="avatar bg-primary">{{ contacto.iniciales }}</div>
                    <!-- Puntito verde/gris de "En línea" -->
                    <span class="status-indicator" [ngClass]="contacto.online ? 'online' : 'offline'" [title]="contacto.online ? 'En línea' : 'Desconectado'"></span>
                </div>
                
                <h3 class="name">{{ contacto.nombre }}</h3>
                <span class="role">{{ contacto.rol }}</span>
                <span class="area-badge">{{ contacto.area }}</span>
            </div>

            <div class="card-footer">
                <button class="action-btn" (click)="abrirChat(contacto)" title="Enviar mensaje por Chat">
                    <i class="pi pi-comment"></i>
                </button>
                <button class="action-btn" (click)="enviarCorreo(contacto)" title="Enviar Correo">
                    <i class="pi pi-envelope"></i>
                </button>
                <button class="action-btn" *ngIf="contacto.telefono" (click)="iniciarLlamada(contacto)" title="Llamar por teléfono">
                    <i class="pi pi-phone"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Estado Vacío -->
    <div class="empty-state" *ngIf="!cargando && contactosFiltrados.length === 0">
        <div class="empty-icon"><i class="pi pi-users"></i></div>
        <h3>No hay resultados</h3>
        <p>No se encontraron usuarios que coincidan con tu búsqueda actual.</p>
    </div>
</div>
