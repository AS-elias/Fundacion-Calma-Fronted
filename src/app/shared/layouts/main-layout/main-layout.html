<div class="layout-wrapper" [ngClass]="{'layout-mobile-active': layoutService.sidebarMobileOpen$ | async}">

  <!-- SIDEBAR -->
  <app-sidebar></app-sidebar>

  <!-- OVERLAY PARA MOVILES -->
  <div class="layout-mask" *ngIf="layoutService.sidebarMobileOpen$ | async" (click)="closeMenu()"></div>

  <!-- AREA PRINCIPAL -->
  <main class="layout-main">

    <!-- HEADER GLOBAL -->
    <app-navbar></app-navbar>

    <!-- CONTENIDO DE LAS PAGINAS -->
    <section class="content-area">
      <router-outlet></router-outlet>
    </section>

  </main>

</div>
